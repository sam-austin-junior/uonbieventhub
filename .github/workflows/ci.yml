name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Type-check + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Build-time DATABASE_URL — Prisma needs *something* parseable to generate
      # the client. No DB calls happen at build time.
      DATABASE_URL: "postgresql://noop:noop@localhost:5432/noop?schema=public"
      AUTH_SECRET: "ci-only-secret-not-used-in-prod"
      NEXT_PUBLIC_APP_URL: "https://uonbieventhub.co.ke"
      RESEND_FROM_EMAIL: "onboarding@resend.dev"
      RESEND_FROM_NAME: "UoN Event Hub"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npx next build
